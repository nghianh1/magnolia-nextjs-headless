image: node:lts

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - build

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
  policy: pull-push

before_script:
  - echo "Using Node.js version:"
  - node -v
  - echo "Using npm version:"
  - npm -v
  - npm ci

build:
  stage: build
  script:
    - npm run build
