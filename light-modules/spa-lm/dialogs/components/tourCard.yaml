label: tourCard
form:
  properties:
    title: 
      $type: textField
      label: Title
      required: true
      i18n: true
    description: 
      $type: richTextField
      i18n: true
      colors: 02373F
      fontSizes: 'Small/0.75rem;Default/1rem;Big/1.5rem'
      label: Description
      required: true
    imageChooser:
      $type: switchableField
      label: Image
      i18n: true
      field:
        $type: comboBoxField
        defaultValue: image
        required: true
        datasource:
          $type: optionListDatasource
          options:
            - name: image
              label: Internal Image
              value: image
            - name: externalImage
              label: External Image
              value: externalImage
      itemProvider:
        $type: jcrChildNodeProvider
      forms:
        - name: image
          properties:
            image:
              i18n: true
              required: true
              $type: damLinkField
              label: Internal Image Link
            imageAlt:
              i18n: true
              $type: textField
              label: Image Alt Text
        - name: externalImage
          properties:
            externalImage:
              i18n: true
              required: true
              $type: textField
              label: External Image Link
              validators:
                imageUrlValidator:
                  $type: regexpValidator
                  pattern: ^https?:\/\/(?:[a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(?:\/[^\s]*)?$
                  errorMessage: Enter a valid Image URL
            externalImageAlt:
              i18n: true
              $type: textField
              label: Image Alt Text